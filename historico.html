<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Histórico de Pedidos</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #111111;
      --white: #ffffff;
      --gray: #f5f5f3;
      --border: #d0d0cc;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--gray);
      min-height: 100vh;
      padding: 30px 16px 60px;
    }

    /* TOP NAV */
    .topbar {
      max-width: 900px;
      margin: 0 auto 28px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .topbar-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      color: var(--black);
    }

    .btn-novo {
      background: var(--black);
      color: var(--white);
      border: none;
      padding: 10px 22px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: background 0.2s;
    }
    .btn-novo:hover { background: #333; }

    /* STATS BAR */
    .stats {
      max-width: 900px;
      margin: 0 auto 24px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .stat-card {
      background: var(--white);
      border-left: 3px solid var(--black);
      padding: 16px 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }

    .stat-label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #888;
      margin-bottom: 4px;
    }

    .stat-value {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      color: var(--black);
    }

    /* SEARCH / FILTER */
    .search-bar {
      max-width: 900px;
      margin: 0 auto 20px;
      display: flex;
      gap: 10px;
    }

    .search-input {
      flex: 1;
      border: 1.5px solid var(--border);
      background: var(--white);
      outline: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      padding: 10px 14px;
      color: var(--black);
      transition: border-color 0.2s;
    }
    .search-input:focus { border-color: var(--black); }

    .btn-limpar {
      background: none;
      border: 1.5px solid var(--border);
      padding: 10px 18px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      color: #888;
      transition: all 0.2s;
    }
    .btn-limpar:hover { border-color: #c0392b; color: #c0392b; }

    /* PEDIDOS LIST */
    .lista {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .empty {
      text-align: center;
      padding: 80px 20px;
      color: #aaa;
    }
    .empty-icon { font-size: 3rem; margin-bottom: 12px; }
    .empty-msg { font-size: 1rem; }

    /* CARD */
    .card {
      background: var(--white);
      box-shadow: 0 2px 16px rgba(0,0,0,0.07);
      overflow: hidden;
      animation: fadeUp 0.35s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-header {
      background: var(--black);
      color: var(--white);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 20px;
      cursor: pointer;
      user-select: none;
    }

    .card-header-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .card-num {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
    }

    .card-cliente {
      font-size: 0.9rem;
      font-weight: 400;
      opacity: 0.85;
    }

    .card-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .card-total {
      font-weight: 600;
      font-size: 1rem;
      letter-spacing: 0.04em;
    }

    .card-data {
      font-size: 0.78rem;
      opacity: 0.65;
    }

    .chevron {
      font-size: 0.8rem;
      transition: transform 0.25s;
    }
    .card.open .chevron { transform: rotate(180deg); }

    /* CARD BODY */
    .card-body {
      display: none;
      padding: 20px 20px 16px;
    }
    .card.open .card-body { display: block; }

    .meta-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px 24px;
      margin-bottom: 18px;
    }

    .meta-item { font-size: 0.85rem; }
    .meta-key { font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; font-size: 0.72rem; color: #888; display: block; margin-bottom: 2px; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.84rem;
      margin-bottom: 14px;
    }

    thead th {
      background: var(--black);
      color: var(--white);
      text-transform: uppercase;
      letter-spacing: 0.10em;
      font-size: 0.70rem;
      font-weight: 500;
      padding: 8px 10px;
      text-align: left;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    tbody td {
      border: 1px solid var(--border);
      padding: 7px 10px;
      color: var(--black);
    }

    .total-line {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 0;
      margin-bottom: 14px;
    }

    .tl-label {
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 9px 14px;
      background: var(--gray);
      border: 1px solid var(--border);
      border-right: none;
    }

    .tl-val {
      min-width: 120px;
      padding: 9px 14px;
      font-weight: 600;
      border: 1px solid var(--black);
      text-align: right;
    }

    .obs-line {
      font-size: 0.82rem;
      color: #555;
      border-top: 1px solid var(--border);
      padding-top: 10px;
      margin-top: 4px;
    }

    .obs-line strong { color: var(--black); }

    .card-actions {
      display: flex;
      gap: 8px;
      padding: 10px 20px 16px;
      justify-content: flex-end;
    }

    .btn-imp-card {
      background: var(--black);
      color: var(--white);
      border: none;
      padding: 8px 18px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-imp-card:hover { background: #333; }

    .btn-del-card {
      background: none;
      color: #c0392b;
      border: 1.5px solid #c0392b;
      padding: 8px 18px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-del-card:hover { background: #c0392b; color: var(--white); }

    /* ═══════════════════════════════════════════════════
       IMPRESSÃO — ELGIN i8 (bobina 79,5 mm, 203 DPI)
       Área útil de impressão ≈ 72 mm (descontando margens)
       Fonte mínima legível em 203 DPI ≈ 7–8pt
       SEM fundos coloridos: impressora térmica = só preto
    ═══════════════════════════════════════════════════ */
    @media print {
      /* Tamanho de página compatível com rolo contínuo 80mm */
      @page {
        size: 80mm auto;          /* largura fixa; altura automática = rolo */
        margin: 4mm 3mm 8mm 3mm; /* top | right | bottom | left */
      }

      /* Reset geral */
      * {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
        color-adjust: exact !important;
        box-shadow: none !important;
        text-shadow: none !important;
        animation: none !important;
      }

      /* Ocultar tudo que não é o cupom */
      body {
        background: #fff !important;
        padding: 0 !important;
        margin: 0 !important;
        font-family: 'Courier New', Courier, monospace !important;
        font-size: 8pt !important;
        width: 72mm !important;
      }

      .topbar,
      .stats,
      .search-bar,
      .card-actions,
      .chevron,
      .btn-imp-card,
      .btn-del-card { display: none !important; }

      /* Ocultar cards fechados — só imprime o aberto */
      .card:not(.open) { display: none !important; }

      /* Layout do card no cupom */
      .card {
        width: 72mm !important;
        max-width: 72mm !important;
        border: none !important;
        margin: 0 !important;
        padding: 0 !important;
        page-break-inside: avoid;
      }

      /* Cabeçalho: fundo BRANCO, texto PRETO — 100% seguro em térmica */
      .card-header {
        background: #fff !important;
        color: #000 !important;
        padding: 4px 4px !important;
        font-size: 9pt !important;
        font-weight: bold;
        display: flex !important;
        justify-content: space-between;
        border-bottom: 2px solid #000 !important;
      }

      .card-header-left,
      .card-header .card-right { gap: 6px !important; }

      .card-num   { font-size: 10pt !important; font-weight: bold !important; color: #000 !important; }
      .card-cliente,
      .card-data,
      .card-total { font-size: 8pt !important; color: #000 !important; }

      /* Corpo do cupom */
      .card-body {
        display: block !important;
        padding: 3px 0 !important;
      }

      /* Metadados (nome, tel, endereço) — texto corrido, compacto */
      .meta-grid {
        display: block !important;
        margin-bottom: 4px !important;
      }

      .meta-item {
        font-size: 7.5pt !important;
        line-height: 1.3 !important;
        margin-bottom: 1px;
      }

      .meta-key {
        font-size: 6.5pt !important;
        letter-spacing: 0 !important;
        text-transform: uppercase;
        display: inline !important;
        font-weight: bold;
        color: #000 !important;
      }

      /* Separador visual entre seções */
      .meta-grid::after {
        content: '--------------------------------';
        display: block;
        font-size: 7pt;
        letter-spacing: -1px;
        margin: 3px 0;
        font-family: 'Courier New', monospace;
      }

      /* Tabela de itens — ajustada para 72mm */
      table {
        width: 100% !important;
        border-collapse: collapse !important;
        font-size: 7.5pt !important;
        font-family: 'Courier New', Courier, monospace !important;
        margin-bottom: 3px !important;
        table-layout: fixed;
      }

      /* Colunas proporcional para 72mm:
         Qt(10mm) | Descrição(32mm) | Unit(14mm) | Total(16mm) */
      thead th:nth-child(1) { width: 8mm; }
      thead th:nth-child(2) { width: 36mm; }
      thead th:nth-child(3) { width: 14mm; }
      thead th:nth-child(4) { width: 14mm; }

      thead th {
        background: #fff !important;
        color: #000 !important;
        font-size: 6.5pt !important;
        padding: 2px 2px !important;
        text-align: left;
        border-bottom: 2px solid #000 !important;
        border-top: 1px solid #000 !important;
        font-weight: bold;
        letter-spacing: 0 !important;
        text-transform: uppercase;
        overflow: hidden;
        white-space: nowrap;
      }

      tbody td {
        border: none !important;
        border-bottom: 1px dotted #aaa !important;
        padding: 2px 2px !important;
        font-size: 7.5pt !important;
        vertical-align: top;
        word-break: break-word;
        overflow-wrap: break-word;
        white-space: normal !important;
      }

      /* Total */
      .total-line {
        display: flex !important;
        justify-content: space-between !important;
        border-top: 2px solid #000 !important;
        padding-top: 3px !important;
        margin: 3px 0 !important;
      }

      .tl-label {
        font-size: 8pt !important;
        font-weight: bold !important;
        background: none !important;
        border: none !important;
        padding: 0 !important;
        letter-spacing: 0 !important;
      }

      .tl-val {
        font-size: 9pt !important;
        font-weight: bold !important;
        border: none !important;
        min-width: auto !important;
        padding: 0 !important;
        text-align: right;
      }

      /* Observações */
      .obs-line {
        font-size: 7pt !important;
        border-top: 1px dashed #000 !important;
        padding-top: 3px !important;
        margin-top: 3px !important;
        color: #000 !important;
        word-break: break-word;
      }

      /* Rodapé automático após cada cupom */
      .card-body::after {
        content: '================================';
        display: block;
        font-size: 7pt;
        text-align: center;
        letter-spacing: -1px;
        margin-top: 6px;
        font-family: 'Courier New', monospace;
      }
    }

    small {
      text-align: center;
      display: block;
      margin-top: 32px;
    }

    small a {
      text-decoration: none;
      color: #332b9e;
    }

  </style>
</head>
<body>

  <div class="topbar">
    <h1 class="topbar-title">Histórico de Pedidos</h1>
    <a href="index.html" class="btn-novo">+ Novo Pedido</a>
  </div>

  <!-- STATS -->
  <div class="stats">
    <div class="stat-card">
      <div class="stat-label">Total de Pedidos</div>
      <div class="stat-value" id="statTotal">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Faturamento Total</div>
      <div class="stat-value" id="statFat">R$ 0,00</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Ticket Médio</div>
      <div class="stat-value" id="statMedio">R$ 0,00</div>
    </div>
  </div>

  <!-- SEARCH -->
  <div class="search-bar">
    <input class="search-input" type="text" id="busca" placeholder="Buscar por nome, nº do pedido, telefone..." oninput="renderLista()" />
    <button class="btn-limpar" onclick="if(confirm('Apagar TODOS os pedidos?')){localStorage.removeItem('pedidos');localStorage.removeItem('pedido_counter');renderLista();}">Limpar Tudo</button>
  </div>

  <!-- LISTA -->
  <div class="lista" id="lista"></div>

  <small>Desenvolvido por &lt;<a href="https://www.instagram.com/kelviny_m/">Kelviny Mickael</a>&sol;&gt;</small>

  <script>
    function getPedidos() {
      return JSON.parse(localStorage.getItem('pedidos') || '[]');
    }

    function renderStats(pedidos) {
      const count = pedidos.length;
      const fat = pedidos.reduce((s, p) => s + parseFloat((p.total||'0').replace(',','.')), 0);
      document.getElementById('statTotal').textContent = count;
      document.getElementById('statFat').textContent = 'R$ ' + fat.toFixed(2).replace('.', ',');
      document.getElementById('statMedio').textContent = count ? 'R$ ' + (fat/count).toFixed(2).replace('.', ',') : 'R$ 0,00';
    }

    function renderLista() {
      const busca = document.getElementById('busca').value.toLowerCase();
      let pedidos = getPedidos();
      if (busca) {
        pedidos = pedidos.filter(p =>
          (p.nome||'').toLowerCase().includes(busca) ||
          (p.id||'').toLowerCase().includes(busca) ||
          (p.telefone||'').toLowerCase().includes(busca)
        );
      }
      renderStats(getPedidos());
      const lista = document.getElementById('lista');
      if (!pedidos.length) {
        lista.innerHTML = `<div class="empty"><div class="empty-icon">📋</div><div class="empty-msg">Nenhum pedido encontrado.</div></div>`;
        return;
      }
      lista.innerHTML = pedidos.map((p, i) => buildCard(p, i)).join('');
    }

    function buildCard(p, i) {
      const itens = (p.itens||[]).filter(it => it.qtd || it.desc);
      const linhas = itens.map(it => `
        <tr>
          <td>${it.qtd||''}</td>
          <td>${it.desc||''}</td>
          <td>R$ ${parseFloat(it.unit||0).toFixed(2).replace('.',',')}</td>
          <td>R$ ${it.tot||'0,00'}</td>
        </tr>`).join('');

      return `
      <div class="card" id="card-${p.id}" style="animation-delay:${i*0.04}s">
        <div class="card-header" onclick="toggleCard('${p.id}')">
          <div class="card-header-left">
            <span class="card-num">#${p.id}</span>
            <span class="card-cliente">${p.nome || '—'}</span>
          </div>
          <div class="card-right">
            <span class="card-data">${p.data||''}</span>
            <span class="card-total">R$ ${p.total||'0,00'}</span>
            <span class="chevron">▼</span>
          </div>
        </div>
        <div class="card-body">
          <div class="meta-grid">
            <div class="meta-item"><span class="meta-key">Endereço / Mesa</span>${p.endereco||'—'}</div>
          </div>
          <table>
            <thead>
              <tr>
                <th>Quant.</th>
                <th>Descrição / Item</th>
                <th>Unitário</th>
                <th>Total R$</th>
              </tr>
            </thead>
            <tbody>${linhas}</tbody>
          </table>
          <div class="total-line">
            <span class="tl-label">Total R$</span>
            <span class="tl-val">R$ ${p.total||'0,00'}</span>
          </div>
          ${p.obs ? `<div class="obs-line"><strong>Obs:</strong> ${p.obs}</div>` : ''}
        </div>
        <div class="card-actions">
          <button class="btn-imp-card" onclick="imprimirCard('${p.id}')">🖨️ Imprimir</button>
          <button class="btn-del-card" onclick="deletar('${p.id}')">🗑️ Excluir</button>
        </div>
      </div>`;
    }

    function toggleCard(id) {
      document.getElementById('card-' + id).classList.toggle('open');
    }

    function deletar(id) {
      if (!confirm('Excluir pedido #' + id + '?')) return;
      let pedidos = getPedidos().filter(p => p.id !== id);
      localStorage.setItem('pedidos', JSON.stringify(pedidos));
      renderLista();
    }

    function imprimirCard(id) {
      // fecha todos, abre só o que vai imprimir
      document.querySelectorAll('.card').forEach(c => c.classList.remove('open'));
      document.getElementById('card-' + id).classList.add('open');
      setTimeout(() => window.print(), 200);
    }

    renderLista();
  </script>
</body>
</html>
